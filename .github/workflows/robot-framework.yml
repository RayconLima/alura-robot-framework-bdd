name: Robot Framework Tests

on: [push, pull_request]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install robotframework
          # pip install -r requirements.txt # Se tiver dependências

      - name: Run Robot Framework
        run: |
          robot -d results tests/ # Ajuste a pasta dos testes
        
      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: report
          path: results/
