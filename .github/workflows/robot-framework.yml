name: Robot Framework CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install robotframework robotframework-seleniumlibrary selenium webdriver-manager

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget -O /tmp/google-chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i /tmp/google-chrome.deb || sudo apt-get -f install -y

      - name: Setup Chromedriver (webdriver-manager)
        run: |
          python - <<'PY'
          from webdriver_manager.chrome import ChromeDriverManager
          import os, pathlib, sys
          path = ChromeDriverManager().install()
          print(path)
          os.environ["PATH"] += os.pathsep + str(pathlib.Path(path).parent)
          PY

      - name: Run Robot tests
        run: |
          robot --variable BASE_URL:https://robot-framework-organo.vercel.app/ --output output.xml --log log.html --report report.html .
      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: robot-reports
          path: output.xml, log.html, report.html